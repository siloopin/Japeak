version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: japeak-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: japeak
    volumes:
      - japeak-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  japeak-mysql-data:
